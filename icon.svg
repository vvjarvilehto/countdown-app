<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.97"/>
      <stop offset="100%" stop-color="#fff7ed" stop-opacity="0.97"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Clock face -->
  <circle cx="256" cy="268" r="170" fill="url(#face)"/>
  <!-- Tick marks -->
  <g stroke="#ea580c" stroke-linecap="round">
    <line x1="256" y1="110" x2="256" y2="130" stroke-width="14"/>
    <line x1="414" y1="268" x2="394" y2="268" stroke-width="14"/>
    <line x1="256" y1="426" x2="256" y2="406" stroke-width="14"/>
    <line x1="98" y1="268" x2="118" y2="268" stroke-width="14"/>
    <line x1="326" y1="120" x2="319" y2="138" stroke-width="8" stroke-opacity="0.4"/>
    <line x1="383" y1="173" x2="368" y2="184" stroke-width="8" stroke-opacity="0.4"/>
    <line x1="404" y1="338" x2="387" y2="330" stroke-width="8" stroke-opacity="0.4"/>
    <line x1="350" y1="395" x2="340" y2="380" stroke-width="8" stroke-opacity="0.4"/>
    <line x1="162" y1="395" x2="172" y2="380" stroke-width="8" stroke-opacity="0.4"/>
    <line x1="108" y1="338" x2="125" y2="330" stroke-width="8" stroke-opacity="0.4"/>
    <line x1="129" y1="173" x2="144" y2="184" stroke-width="8" stroke-opacity="0.4"/>
    <line x1="186" y1="120" x2="193" y2="138" stroke-width="8" stroke-opacity="0.4"/>
  </g>
  <!-- Hour hand (~10 o'clock) -->
  <line x1="256" y1="268" x2="196" y2="178" stroke="#1c1917" stroke-width="16" stroke-linecap="round"/>
  <!-- Minute hand (~12 o'clock) -->
  <line x1="256" y1="268" x2="256" y2="148" stroke="#ea580c" stroke-width="12" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="268" r="14" fill="#ea580c"/>
  <!-- Crown knob -->
  <rect x="236" y="88" width="40" height="22" rx="8" fill="#ea580c"/>
</svg>
